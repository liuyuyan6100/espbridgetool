<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serial Bridge — ESP32 串口调试</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- 顶部导航 -->
<header class="topbar">
    <div class="topbar-brand">
        <span class="logo-icon">🔌</span>
        <span class="logo-text">Serial Bridge</span>
        <span class="ver">v1.1</span>
    </div>
    <div class="topbar-actions">
        <button id="btnSettings" class="btn-icon" title="串口设置">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
        </button>
        <div class="status-dot" id="connDot" title="连接状态"></div>
        <span class="status-text" id="connText">未连接</span>
    </div>
</header>

<!-- 主体布局 -->
<div class="layout">
    <!-- 左侧栏 -->
    <aside class="sidebar" id="sidebar">
        <!-- 串口设置卡片 -->
        <div class="card">
            <div class="card-header">
                <span>串口设置</span>
                <button class="btn-toggle" id="toggleSerial">▾</button>
            </div>
            <div class="card-body" id="serialPanel">
                <div class="form-row">
                    <label>端口</label>
                    <div class="port-row">
                        <select id="portSelect" class="select"><option value="">选择串口</option></select>
                        <button id="btnRefreshPorts" class="btn-icon-sm" title="刷新端口">⟳</button>
                    </div>
                </div>
                <div class="form-row">
                    <label>波特率</label>
                    <select id="baudSelect" class="select">
                        <option>1200</option><option>2400</option><option>4800</option>
                        <option>9600</option><option>19200</option><option>38400</option>
                        <option>57600</option><option selected>115200</option>
                        <option>230400</option><option>460800</option><option>921600</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>数据位</label>
                    <select id="dataBitsSelect" class="select">
                        <option>8</option><option>7</option><option>6</option><option>5</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>停止位</label>
                    <select id="stopBitsSelect" class="select">
                        <option value="1">1</option><option value="2">2</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>校验位</label>
                    <select id="paritySelect" class="select">
                        <option value="N">None</option>
                        <option value="E">Even</option>
                        <option value="O">Odd</option>
                    </select>
                </div>
                <div class="btn-group">
                    <button id="btnConnect" class="btn btn-primary">打开串口</button>
                    <button id="btnDisconnect" class="btn btn-danger" disabled>关闭</button>
                </div>
            </div>
        </div>

        <!-- 收发统计 -->
        <div class="card">
            <div class="card-header">
                <span>收发统计</span>
                <button class="btn-toggle" id="toggleStats">▾</button>
            </div>
            <div class="card-body" id="statsPanel">
                <div class="stat-row">
                    <span class="stat-label">TX 发送</span>
                    <span class="stat-value" id="statTx">0 B</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">RX 接收</span>
                    <span class="stat-value" id="statRx">0 B</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">日志行数</span>
                    <span class="stat-value" id="statLogs">0</span>
                </div>
                <button id="btnResetStats" class="btn btn-ghost btn-sm">重置统计</button>
            </div>
        </div>

        <!-- idf.py 工具 -->
        <div class="card">
            <div class="card-header">
                <span>ESP-IDF 工具</span>
                <button class="btn-toggle" id="toggleIdf">▾</button>
            </div>
            <div class="card-body" id="idfPanel">
                <button id="btnBuild" class="btn btn-ghost btn-block">🔨 编译</button>
                <button id="btnFlash" class="btn btn-warn btn-block">🔥 烧录</button>
                <button id="btnClean" class="btn btn-ghost btn-block">🧹 清理</button>
                <button id="btnBmgr" class="btn btn-ghost btn-block">📦 BMGR</button>
            </div>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main">
        <!-- 日志工具栏 -->
        <div class="log-toolbar">
            <div class="toolbar-left">
                <div class="seg-group">
                    <button class="seg-btn active" data-view="text" id="viewText">文本</button>
                    <button class="seg-btn" data-view="hex" id="viewHex">HEX</button>
                    <button class="seg-btn" data-view="ansi" id="viewAnsi">彩色</button>
                </div>
                <label class="checkbox">
                    <input type="checkbox" id="autoScroll" checked> 自动滚动
                </label>
                <label class="checkbox">
                    <input type="checkbox" id="showTs"> 时间戳
                </label>
            </div>
            <div class="toolbar-right">
                <input type="text" id="filterInput" class="input-filter" placeholder="过滤关键字...">
                <button id="btnExport" class="btn-icon-sm" title="导出日志">📥</button>
                <button id="btnClearLog" class="btn-icon-sm" title="清空日志">🗑</button>
            </div>
        </div>

        <!-- 日志显示区 -->
        <div class="log-view" id="logView"></div>

        <!-- 发送区 -->
        <div class="send-area">
            <div class="send-options">
                <label class="checkbox">
                    <input type="checkbox" id="hexSend"> HEX 发送
                </label>
                <label class="checkbox">
                    <input type="checkbox" id="addNl" checked> 追加换行
                </label>
                <label class="checkbox">
                    <input type="checkbox" id="loopSend"> 循环发送
                </label>
                <input type="number" id="loopInterval" class="input-num" value="1000" min="50" step="50"> ms
            </div>
            <div class="send-row">
                <textarea id="sendInput" class="send-input" placeholder="输入要发送的内容..." rows="1"></textarea>
                <button id="btnSend" class="btn btn-primary btn-send">发送</button>
            </div>
        </div>
    </main>

    <!-- 右侧快捷命令 -->
    <aside class="sidebar-right" id="sidebarRight">
        <div class="card">
            <div class="card-header">
                <span>快捷发送</span>
                <button id="btnAddCmd" class="btn-icon-sm" title="添加命令">＋</button>
            </div>
            <div class="card-body" id="quickCmdList">
                <!-- 快捷命令动态生成 -->
            </div>
        </div>
    </aside>
</div>

<!-- 添加命令弹窗 -->
<div class="modal-overlay" id="modalAddCmd" style="display:none;">
    <div class="modal">
        <div class="modal-header">
            <span>添加快捷命令</span>
            <button class="btn-close" id="closeModal">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-row">
                <label>名称</label>
                <input type="text" id="cmdName" class="input-text" placeholder="如: 重启模块">
            </div>
            <div class="form-row">
                <label>命令</label>
                <input type="text" id="cmdContent" class="input-text" placeholder="如: AT+RST">
            </div>
            <div class="form-row">
                <label class="checkbox">
                    <input type="checkbox" id="cmdHex"> HEX 模式
                </label>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" id="cancelCmd">取消</button>
            <button class="btn btn-primary" id="saveCmd">保存</button>
        </div>
    </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
